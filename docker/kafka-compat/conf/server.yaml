#==============================================================================
# ZooKeeper
#==============================================================================

zookeeper.address: ${ZOOKEEPER_ADDRESS:-zookeeper:2181}

#==============================================================================
# Storage
#==============================================================================

default.bucket.number: 1
default.replication.factor: 1
data.dir: /tmp/fluss/data
remote.data.dir: /tmp/fluss/remote

#==============================================================================
# Listeners — overridden per role via FLUSS_PROPERTIES
#==============================================================================

# Coordinator:  FLUSS://0.0.0.0:9122
# Tablet:       FLUSS://0.0.0.0:9123,KAFKA://0.0.0.0:9092
bind.listeners: FLUSS://0.0.0.0:9123

#==============================================================================
# Kafka wire-protocol compatibility
#==============================================================================

kafka.enabled: true
kafka.listener.names: KAFKA
kafka.database: kafka

# Advertised to Kafka clients — set to the host reachable from outside the pod.
# Injected via KAFKA_ADVERTISED_HOST env var; falls back to "localhost".
advertised.listeners: KAFKA://${KAFKA_ADVERTISED_HOST:-localhost}:9092

# Schema Registry (Confluent-compatible) on the coordinator leader.
kafka.schema-registry.enabled: true
kafka.schema-registry.host: 0.0.0.0
kafka.schema-registry.port: 8081
