# Fluss with Kafka wire-protocol compatibility.
#
# Exposed ports:
#   9092  — Kafka API (bootstrap server for any Kafka client)
#   8081  — Confluent-compatible Schema Registry
#   9123  — Fluss native RPC (optional direct access)
#
# Quick start:
#   ./build.sh                          # build image (once after each source change)
#   podman compose up -d
#   kcat -b localhost:9092 -L           # list topics via Kafka API
#   podman compose down

name: fluss-kafka

services:
  zookeeper:
    image: bitnami/zookeeper:3.8
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fluss-net

  coordinator:
    image: fluss-kafka:latest
    command: coordinatorServer
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      ZOOKEEPER_ADDRESS: zookeeper:2181
      # Override bind.listeners for the coordinator role (no Kafka listener here).
      FLUSS_PROPERTIES: |
        bind.listeners: FLUSS://0.0.0.0:9122
        tablet-server.id: -1
    ports:
      - "9122:9122"
      - "8081:8081"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9122"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - fluss-net

  tablet:
    image: fluss-kafka:latest
    command: tabletServer
    depends_on:
      coordinator:
        condition: service_healthy
    environment:
      ZOOKEEPER_ADDRESS: zookeeper:2181
      # KAFKA_ADVERTISED_HOST: set this to your machine's LAN IP if connecting from outside the pod.
      KAFKA_ADVERTISED_HOST: ${KAFKA_ADVERTISED_HOST:-localhost}
      FLUSS_PROPERTIES: |
        bind.listeners: FLUSS://0.0.0.0:9123,KAFKA://0.0.0.0:9092
        tablet-server.id: 0
    ports:
      - "9092:9092"
      - "9123:9123"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - fluss-net

networks:
  fluss-net:
    driver: bridge
